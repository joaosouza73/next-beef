<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Configurações básicas -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título do site (aparece na aba do navegador) -->
  <title>Next Beef</title>

  <!-- Importação de fontes (Google Fonts) -->
  <!-- Poppins = moderno (menu e textos) -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

  <!-- Link do CSS externo -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <!-- Cabeçalho principal do site -->
  <header class="header">

    <!-- ===== LOGO / MARCA ===== -->
    <div class="logo">
      <img src="assets/next_beef-removebg-preview.png" alt="Next Beef Logo">
    </div>

    <!-- ===== BOTÃO MOBILE (hambúrguer) ===== -->
    <!-- Só aparece em telas pequenas -->
    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <!-- ===== MENU DE NAVEGAÇÃO ===== -->
    <nav class="nav" id="nav">
      <ul>
        <!-- Cada item é uma seção do site -->
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Produtos</a></li>
        <li><a href="#">Parceiros</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>

  </header>
  <!-- ================= FIM HEADER ================= -->

  <!-- ================= HERO SECTION ================= -->
<section class="hero">

  <!-- Conteúdo da esquerda -->
  <div class="hero-content">
    <h1>
      Carnes selecionadas <br>
      para quem exige qualidade
    </h1>

    <p>
      Atendimento para Restaurantes, Açougues e Distribuidores
    </p>

    <a href="#" class="btn">Falar no WhatsApp</a>
  </div>

</section>


  <!-- Script JS externo -->
  <script src="script.js"></script>

</body>
</html>
